name: Fetch ENTSO-E Prices

on:
  schedule:
    - cron: '0 * * * *'   # stündlich — Morgen-Preise erscheinen ~12:00 UTC
  workflow_dispatch:       # manuell auslösbar

concurrency:
  group: fetch-entsoe-prices
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync main
        run: git pull --rebase origin main

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch prices
        run: python fetch_prices.py

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No price changes to commit."
            exit 0
          fi

          git commit -m "chore: update price data"

          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep $((attempt * 5))
          done

          echo "Push failed after 3 attempts."
          exit 1
