name: Fetch ENTSO-E Prices

on:
  schedule:
    - cron: '0 * * * *'   # stündlich — Morgen-Preise erscheinen ~12:00 UTC
  workflow_dispatch:       # manuell auslösbar

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch prices
        run: python fetch_prices.py

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: update price data"
          git push
